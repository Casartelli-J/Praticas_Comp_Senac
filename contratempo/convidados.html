<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/css.css">
</head>

<body>

    <div class="modal fade" id="atualizaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Área de Atualização</h1>
                </div>
                <div class="modal-body">
                    <form class="col-12">
                        <h3 class="">Atualizar pangaré</h3>
                        <p class="m-0">Nome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu nome" id="nome">
                        <p class="m-0">Sobrenome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu sobrenome" id="sobrenome">
                        <p class="m-0">CPF:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu cpf" id="cpf">
                        <p class="m-0">Telefone:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu telefone" id="telefone">
                        <p class="m-0">Email:</p>
                        <input type="text"  class="form-control mb-2" placeholder="Insira seu email" id="email">
                        <p class="m-0">Mesa:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu mesa" id="mesa">
                        <div id="erro"></div>
                        <button type="button" class="btn btn-success mt-3" onclick="insertConvidado()">Adicionar</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 d-flex  justify-content-center mt-5">
                <div class="col-5">
                    <input class="form-control py-2" type="text" placeholder="Busque o convidado" id="busca">
                </div>
                <button class="btn btn-success" type="button" onclick="pegaConvidado()">Buscar</button>
            </div>
        </div>
        <div class="row justify-content-center mt-5">
            <div class="col-8">
                <table class="table table-dark">
                    <thead>
                        <tr>
                            <td>Nome</td>
                            <td>Email</td>
                            <td>Mesa</td>
                            <td>Presente</td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody id="fds">
                    </tbody>
                </table>
            </div>
        </div>
        <br>
        <form class="col-2">
            <h3 class="text-white">Adicionar pangaré</h3>
            <p class="text-white m-0">Nome:</p>
            <input type="text" class="form-control mb-2" placeholder="Insira seu nome" id="nome">
            <p class="text-white m-0">Sobrenome:</p>
            <input type="text" class="form-control mb-2" placeholder="Insira seu sobrenome" id="sobrenome">
            <p class="text-white m-0">CPF:</p>
            <input type="number" class="form-control mb-2" placeholder="Insira seu cpf" id="cpf">
            <p class="text-white m-0">Telefone:</p>
            <input type="number" class="form-control mb-2" placeholder="Insira seu telefone" id="telefone">
            <p class="text-white m-0">Email:</p>
            <input type="text"  class="form-control mb-2" placeholder="Insira seu email" id="email">
            <p class="text-white m-0">Mesa:</p>
            <input type="number" class="form-control mb-2" placeholder="Insira seu mesa" id="mesa">
            <div id="erro"></div>
            <button type="button" class="btn btn-success mt-3" onclick="insertConvidado()">Adicionar</button>
        </form>

    </div>

    <script>

        const token = localStorage.getItem("token");
        const tipo = localStorage.getItem("tipo");
        if(!token || tipo != "0"){
            alert("Você não tem permissão")
            localStorage.clear()
            window.location.href = "login.html";
        }

        async function pegaConvidado(){
            const input = document.querySelector("#busca").value;
            const convidados = await fetch(`http://localhost:3000/convidados?nome=${input}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            const lista = await convidados.json();
            let tabela = "";
            lista.forEach(convidado => {
                tabela += 
                `<tr>
                    <td>
                        ${convidado.nome}
                    </td>
                    <td>
                        ${convidado.email}
                    </td>
                    <td>
                        ${convidado.mesa}
                    </td>
                    <td>
                        ${convidado.presente}
                    </td>
                    <td>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#atualizaModal" type="button" onclick="atualizaConvidado(${convidado.id})">Atualizar</button>
                    </td>
                    <td>
                        <button class="btn btn-danger" type="button" onclick="deletaConvidado(${convidado.id})">Deletar</button>
                    </td>
                    <td>
                        <button class="btn btn-info" type="button" onclick="checkConvidado(${convidado.id})">Presente</button>
                    </td>
                `
            });
            tabela += "</tr>"
            document.querySelector("#fds").innerHTML = tabela;
        }
        pegaConvidado();

        async function insertConvidado(){
            const nome = document.querySelector("#nome").value;
            const sobrenome = document.querySelector("#sobrenome").value;
            const cpf = document.querySelector("#cpf").value;
            const telefone = document.querySelector("#telefone").value;
            const email = document.querySelector("#email").value;
            const mesa = document.querySelector("#mesa").value;

            const inserir = await fetch(`http://localhost:3000/convidados/`, {
                method : "POST",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify({
                    nome : nome,
                    sobrenome : sobrenome,
                    cpf : cpf,
                    telefone : telefone,
                    email : email,
                    mesa : mesa
                })                
            });
            if(!inserir.ok){
                let erroAviso = "<p>Não foi</p>";
                document.querySelector("#erro").innerHTML = erroAviso;
            }
            pegaConvidado();
        }

        async function atualizaConvidado(id){
            const nome = document.querySelector("#nome").value;
            const sobrenome = document.querySelector("#sobrenome").value;
            const cpf = document.querySelector("#cpf").value;
            const telefone = document.querySelector("#telefone").value;
            const email = document.querySelector("#email").value;
            const mesa = document.querySelector("#mesa").value;

            const atualizador = await fetch(`http://localhost:3000/convidados/${id}`,{ 
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify({
                    nome : nome,
                    sobrenome : sobrenome,
                    cpf : cpf,
                    telefone : telefone,
                    email : email,
                    mesa : mesa
                })
            })
            pegaConvidado();
        }
    
        async function deletaConvidado(id){
            if(confirm("Ah vá?")){
                const deletar = await fetch(`http://localhost:3000/convidados/${id}`, {
                    method : "DELETE",
                    headers : {
                        "Content-Type" : "application/json"
                    }
                })
                pegaConvidado();
            }
        }
    
        async function checkConvidado(id){
            const check = await fetch(`http://localhost:3000/convidados/check/${id}`, {
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            pegaConvidado();
        }
    </script>
</body>
</html>
