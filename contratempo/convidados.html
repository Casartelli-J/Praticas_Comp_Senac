<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/css.css">
    <style>
        @media (min-width: 768px) {
            .sidebar-md-vh {
                min-height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div class="modal fade" id="atualizaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Atualizar Convidado</h1>
                </div>
                <div class="modal-body">
                    <form class="col-12" id="atualizador">
                        <p class="m-0">Nome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu nome" id="AttNome">
                        <p class="m-0">Sobrenome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu sobrenome" id="AttSobrenome">
                        <p class="m-0">CPF:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu cpf" id="AttCpf">
                        <p class="m-0">Telefone:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu telefone" id="AttTelefone">
                        <p class="m-0">Email:</p>
                        <input type="text"  class="form-control mb-2" placeholder="Insira seu email" id="AttEmail">
                        <p class="m-0">Mesa:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu mesa" id="AttMesa">
                        <div id="erro"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="bt-inserir" onclick="atualizaConvidado()">Atualizar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="insereModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Inserir Convidado</h1>
                </div>
                <div class="modal-body">
                    <form class="col-12" id="inseridor">
                        <p class="m-0">Nome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu nome" id="nome">
                        <p class="m-0">Sobrenome:</p>
                        <input type="text" class="form-control mb-2" placeholder="Insira seu sobrenome" id="sobrenome">
                        <p class="m-0">CPF:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu cpf" id="cpf">
                        <p class="m-0">Telefone:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu telefone" id="telefone">
                        <p class="m-0">Email:</p>
                        <input type="text"  class="form-control mb-2" placeholder="Insira seu email" id="email">
                        <p class="m-0">Mesa:</p>
                        <input type="number" class="form-control mb-2" placeholder="Insira seu mesa" id="mesa">
                        <div id="erro"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="bt-inserir" onclick="insertConvidado()">Adicionar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <section class="container-fluid">
        <div class="row justify-content-between sidebar-md-vh">
            <div class="col-2 bg-dark">
                <h3 class="ms-3 mt-3 text-primary">Casamento</h3>
                <div class="col-4 text-white">
                    <p class="m-0">bem vindo,</p>
                    <p>Nome</p>
                </div>
                <hr class="text-white">
                <ul class="nav flex-column">
                    <li class="nav-item rounded col-12 mb-2">
                        <a class="nav-link link-light" href="dashboard.html" target="_blank"><i class="bi bi-bar-chart-line-fill me-1 me-md-2"></i>Dashboard</a>
                    </li>
                    <li class="nav-item rounded col-12 mb-2">
                        <a class="nav-link link-light" href="usuarios.html"><i class="bi bi-person-circle me-1"></i>Usuários</a>
                    </li>
                    <li class="nav-item bg-primary rounded col-12 mb-2">
                        <a class="nav-link link-light" href="convidados.html"><i class="bi bi-person-lines-fill me-1"></i>Convidados</a>
                    </li>
                    <li class="nav-item rounded col-12">
                        <a class="nav-link link-light" href="index.html" target="_blank"><i class="bi bi-card-checklist me-1"></i>Presença</a>
                    </li>
                </ul>

                <hr class="text-white text-bottom">
                <button class="btn btn-danger" onclick="sair()">Sair</button>
            </div>
            <div class="col-10 bg-white sidebar-md-vh">
                <h2 class="mt-5 ms-4 fw-bold">Convidados:</h2>
                
                <button class="btn btn-success mt-3 ms-4 px-2 px-3" data-bs-toggle="modal" data-bs-target="#insereModal"><i class="bi bi-person-check-fill me-1"></i>Inserir Convidado</button>

                <div class="col-11 ms-4 table-responsive mt-3">
                    <table class="table table-bordered my-2 shadow">
                        <thead>
                            <tr class="fw-bold">
                                <td>Nome</td>
                                <td>Email</td>
                                <td>Mesa</td>
                                <td>Presente</td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                        </thead>
                        <tbody id="fds">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script>

        async function sair(){
            localStorage.clear();
            window.location.href = "login.html";
        }
        
        const token = localStorage.getItem("token");
        const tipo = localStorage.getItem("tipo");
        if(!token || tipo != "0"){
            alert("Você não tem permissão")
            localStorage.clear()
            window.location.href = "login.html";
        }
        
        async function pegaConvidado(){
            const convidados = await fetch(`http://localhost:3000/convidados`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            const lista = await convidados.json();
            let tabela = "";
            lista.forEach(convidado => {
                tabela += 
                `<tr>
                    <td>
                        ${convidado.nome}
                    </td>
                    <td>
                        ${convidado.email}
                    </td>
                    <td>
                        ${convidado.mesa}
                    </td>
                    <td>
                        ${convidado.presente}
                    </td>
                    <td>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#atualizaModal" type="button" onclick="atualizaConvidado(${convidado.id})">Atualizar</button>
                    </td>
                    <td>
                        <button class="btn btn-danger" type="button" onclick="deletaConvidado(${convidado.id})">Deletar</button>
                    </td>
                    <td>
                        <button class="btn btn-info" type="button" onclick="checkConvidado(${convidado.id})">Presente</button>
                    </td>
                `
            });
            tabela += "</tr>"
            document.querySelector("#fds").innerHTML = tabela;
        }
        pegaConvidado();
        

        async function insertConvidado(){
            const nome = document.querySelector("#nome").value;
            const sobrenome = document.querySelector("#sobrenome").value;
            const cpf = document.querySelector("#cpf").value;
            const telefone = document.querySelector("#telefone").value;
            const email = document.querySelector("#email").value;
            const mesa = document.querySelector("#mesa").value;

            const inserir = await fetch(`http://localhost:3000/convidados/`, {
                method : "POST",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify({
                    nome : nome,
                    sobrenome : sobrenome,
                    cpf : cpf,
                    telefone : telefone,
                    email : email,
                    mesa : mesa
                })                
            });
            if(!inserir.ok){
                let erroAviso = "<p>Não foi</p>";
                document.querySelector("#erro").innerHTML = erroAviso;
            }else{
                pegaConvidado();
                document.querySelector("#inseridor").reset()
            }
        }

        async function atualizaConvidado(id){
            const nome = document.querySelector("#AttNome").value;
            const sobrenome = document.querySelector("#AttSobrenome").value;
            const cpf = document.querySelector("#AttCpf").value;
            const telefone = document.querySelector("#AttTelefone").value;
            const email = document.querySelector("#AttEmail").value;
            const mesa = document.querySelector("#AttMesa").value;

            const atualizador = await fetch(`http://localhost:3000/convidados/${id}`,{ 
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify({
                    nome : nome,
                    sobrenome : sobrenome,
                    cpf : cpf,
                    telefone : telefone,
                    email : email,
                    mesa : mesa
                })
            })
            pegaConvidado();
            document.querySelector("#atualizador")
        }
    
        async function deletaConvidado(id){
            if(confirm("Ah vá?")){
                const deletar = await fetch(`http://localhost:3000/convidados/${id}`, {
                    method : "DELETE",
                    headers : {
                        "Content-Type" : "application/json"
                    }
                })
                pegaConvidado();
            }
        }
    
        async function checkConvidado(id){
            const check = await fetch(`http://localhost:3000/convidados/check/${id}`, {
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            pegaConvidado();
        }
    </script>
</body>
</html>
