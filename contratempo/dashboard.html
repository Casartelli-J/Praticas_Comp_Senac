<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
            <div class="container">
                <span class="navbar-brand"><i class="bi bi-balloon-heart-fill me-2"></i>Wedding Pass</span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse text-center justify-content-end" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active mx-2 my-1" aria-current="page" href="#"><i class="bi bi-speedometer"></i> Dashboard</a>
                        <a class="nav-link mx-2 my-1" href="#"><i class="bi bi-person-badge-fill"></i> Usuários</a>
                        <a class="btn btn-outline-light mx-2 my-1" href="#"><i class="bi bi-list-check"></i> Convidados</a>
                        <a class="btn btn-danger mx-2 my-1" href="#"><i class="bi bi-box-arrow-left"></i> Sair</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col-lg-9 mt-5">
                    <div class="row">
                        <div class="col-lg-4">
                            <div class="card text-bg-dark mb-3">
                                <div class="card-header">Total:</div>
                                <div class="card-body">
                                    <h2 class="fs-1">12</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="card text-bg-success mb-3">
                                <div class="card-header">Presentes:</div>
                                <div class="card-body">
                                    <h2 class="fs-1">12</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="card text-bg-danger mb-3">
                                <div class="card-header">Ausentes:</div>
                                <div class="card-body">
                                    <h2 class="fs-1">12</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-12">
                            <div class="card">
                                <div class="card-header">Lista de convidados:</div>
                                <div class="card-body">
                                    <div class="table-responsive">
                                        <table class="table table-striped">
                                            <thead class="table-dark">
                                                <tr>
                                                    <td>Nome</td>
                                                    <td>Cpf</td>
                                                    <td>Telefone</td>
                                                    <td>Email</td>
                                                    <td>Mesa</td>
                                                    <td></td>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td>Amanda</td>
                                                    <td>12355569845</td>
                                                    <td>51 912348965</td>
                                                    <td>amanda@gmail.com</td>
                                                    <td>1</td>
                                                    <td>
                                                        <button class="btn btn-success my-2"><i class="bi bi-person-check-fill"></i> Presente</button>
                                                        <button class="btn btn-primary" aria-label="Editar convidado"><i class="bi bi-pencil-square"></i></button>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>Amanda</td>
                                                    <td>12355569845</td>
                                                    <td>51 912348965</td>
                                                    <td>amanda@gmail.com</td>
                                                    <td>1</td>
                                                    <td>
                                                        <button class="btn btn-danger my-2"><i class="bi bi-person-x-fill"></i> Ausente</button>
                                                        <button class="btn btn-primary" aria-label="Editar convidado"><i class="bi bi-pencil-square"></i></button>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 mt-5">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="fs-4">Inserir convidado</h2>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label for="nome" class="form-label">Nome:</label>
                                    <input type="text" class="form-control" id="nome">
                                </div>
                                <div class="mb-3">
                                    <label for="sobrenome" class="form-label">Sobrenome:</label>
                                    <input type="text" class="form-control" id="sobrenome">
                                </div>
                                <div class="mb-3">
                                    <label for="cpf" class="form-label">Cpf:</label>
                                    <input type="text" class="form-control" id="cpf">
                                </div>
                                <div class="mb-3">
                                    <label for="telefone" class="form-label">Telefone:</label>
                                    <input type="text" class="form-control" id="telefone">
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email:</label>
                                    <input type="email" class="form-control" id="email">
                                </div>
                                <div class="mb-3">
                                    <label for="mesa" class="form-label">Mesa:</label>
                                    <select class="form-select" id="mesa">
                                        <option value="">---</option>
                                    </select>
                                </div>
                                <button type="button" class="btn btn-success">Cadastrar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
</body>
</html>
