<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/css.css">
</head>

<body>
    <header class="container-fluid">
        <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Área do Adimininastrô</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Index</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="convidados.html">Convidados</a>
                    </li>
                    <li class="nav-item">
                <a class="nav-link" href="usuarios.html">Usuários</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                </div>
            </div>
        </nav>
        
    </header>
    <div class="row justify-content-center">
        <div class="col-10 d-flex pt-5">
            <input type="text" class="form-control py-2" placeholder="Busque o convidado" id="busca">
            <button type="button" class="btn btn-success" onclick="pegaConvidado()">Buscar</button>
            <button class="btn btn-danger" id="sair" onclick="sair()">Sair</button>
        </div>
    </div>
    <section class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-10 pt-5">
                <table class="table table-dark table-striped-columns">
                    <thead>
                        <tr>
                            <td>Nome</td>
                            <td>Email</td>
                            <td>Mesa</td>
                            <td>Presente</td>
                            <td></td>
                        </tr>
                    </thead>
                    <tbody id="fds">
                    </tbody>
                </table>
            </div>
        </div>

    </section>


    <script>
        async function sair(){
            localStorage.clear();
            window.location.href = "login.html";
        }

        const token = localStorage.getItem("token");
        const tipo = localStorage.getItem("tipo");
        if(!token || tipo != "0"){
            alert("Você não tem permissão")
            localStorage.clear()
            window.location.href = "login.html";
        }
        
        
       
        

        async function pegaConvidado(){
            const input = document.querySelector("#busca").value;
            const convidados = await fetch(`http://localhost:3000/convidados?nome=${input}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            const lista = await convidados.json();
            let tabela = "";
            lista.forEach(convidado => {
                tabela += 
                `<tr>
                    <td>
                        ${convidado.nome}
                    </td>
                    <td>
                        ${convidado.email}
                    </td>
                    <td>
                        ${convidado.mesa}
                    </td>
                    <td>
                        ${convidado.presente}
                    </td>
                    <td>
                        <button type="button" class="btn btn-primary" onclick="checkConvidado(${convidado.id})">Presente</button>
                    </td>
                `
            });
            tabela += "</tr>"
            document.querySelector("#fds").innerHTML = tabela;
        }
        pegaConvidado();
   
        async function checkConvidado(id){
            const check = await fetch(`http://localhost:3000/convidados/check/${id}`, {
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json"
                }
            });
            pegaConvidado();
        }
    </script>
</body>
</html>
