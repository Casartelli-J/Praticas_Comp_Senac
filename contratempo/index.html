<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presença</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/css.css">
</head>

<body>
    <header class="container-fluid py-2 corpo">
        <div class="row">
            <div class="col-12 d-flex align-items-center justify-content-between">
                <div class="col-5 d-flex align-items-center">
                    <p class="text-primary fw-bold m-0 fs-3 ms-3 me-3">Casamento</p>
                    <p class="text-secondary m-0 me-2 mt-2">Bem vindo,</p>
                    <p id="nomeCerimo" class="text-white m-0 mt-2 fw-bold"></p>
                </div>
                <button class="btn btn-danger" id="sair" onclick="sair()"><i class="bi bi-box-arrow-left me-2"></i>Sair</button>
        </div>
    </header>
    <section class="container bg-white">
        <div class="row justify-content-center">
            <div class="my-4">
                <div class="input-group">
                    <input type="text" class="form-control py-2" placeholder="Busque o convidado" id="busca">
                    <button type="button" class="btn btn-outline-success" onclick="pegaConvidado()">Buscar</button>
                </div>
            </div>
            <div class="card shadow p-0">
                <div class="card-header d-flex flex-wrap justify-content-between">
                    <span class="align-self-center">Lista de convidados:</span>
                    <div class="col-sm-8 d-flex flex-wrap justify-content-end">
                        <div class="col-sm-6 col-12 align-self-center d-flex">
                            <span class="align-self-center me-3">Filtro:</span>
                            <select class="form-select" id="filtro">
                                <option value="">--</option>
                                <option value="0">Ausentes</option>
                                <option value="1">Presentes</option>
                            </select>
                        </div>
                        <div class="col-sm-6 col-12 text-end">
                            <button class="btn btn-outline-primary" type="button" onclick="exportaConvidado()"><i class="bi bi-download me-1"></i>Exporta</button>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped m-0">
                            <thead>
                                <tr>
                                    <td>Nome</td>
                                    <td>Email</td>
                                    <td>Mesa</td>
                                    <td>Presente</td>
                                    <td></td>
                                </tr>
                            </thead>
                            <tbody id="fds">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    
    <script>
        
        const token = localStorage.getItem("token");
        if(!token){
            alert("Você não tem permissão");
            window.location.href = "login.html";
        }

        async function apareceNome(){
            const id = localStorage.getItem("id");
            const pegaUser = await fetch(`http://localhost:3000/usuarios?id=${id}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });

            const listaUser = await pegaUser.json();
            const [user] = listaUser;
            document.querySelector("#nomeCerimo").innerHTML = user.nome
        }
        apareceNome()


        async function sair(){
            localStorage.clear();
            window.location.href = "login.html";
        } 
       


        
        async function pegaConvidado(){
            const input = document.querySelector("#busca").value;
            const filtro = document.querySelector("#filtro").value;
            const convidados = await fetch(`http://localhost:3000/convidados?nome=${input}&presente=${filtro}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });
            const lista = await convidados.json();
            let tabela = "";
            lista.forEach(convidado => {
                let conv = convidado.presente;
                if(conv === 0){
                    conv = `<i class="bi bi-person-x-fill fs-3 text-danger"></i>`;
                }else{
                    conv = `<i class="bi bi-person-check-fill fs-3 text-success"></i>`;
                }
                tabela += 
                `<tr>
                    <td>
                        ${convidado.nome}
                    </td>
                    <td>
                        ${convidado.email}
                    </td>
                    <td>
                        ${convidado.mesa}
                    </td>
                    <td>
                        ${conv}
                    </td>
                    <td>
                        <button type="button" class="btn btn-primary" onclick="checkConvidado(${convidado.id})">Presente</button>
                    </td>
                `
            });
            tabela += "</tr>"
            document.querySelector("#fds").innerHTML = tabela;
        }
        pegaConvidado();
        const select = document.querySelector("#filtro");
        select.addEventListener("change", () =>{
            pegaConvidado();
        });
   
        async function checkConvidado(id){
            const check = await fetch(`http://localhost:3000/convidados/check/${id}`, {
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });
            pegaConvidado();
        }

        async function exportaConvidado(){
            const exporta = await fetch(`http://localhost:3000/convidados/export`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/pdf"
                }
            })

            const blob = await exporta.blob();

            const url = URL.createObjectURL(blob);

            window.open(url);
        }
    </script>
</body>
</html>
