<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Convidados</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/css.css">
    <script src="https://unpkg.com/imask"></script>
    <style>
        @media (min-width: 768px) {
            .sidebar-md-vh {
                min-height: 100vh;
            }
        }
    </style>
</head>

<body>

    <div class="modal fade" id="atualizaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Atualizar Convidado</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="col-12" id="atualizador">
                        <input type="hidden" id="AttId">
                        <label>Quantidade de lugares:</label>
                        <input class="form-control" type="number" id="AttQtd">
                        <div id="erro"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="bt-atualizar" onclick="atualizaMesa()">Atualizar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="insereModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Inserir Mesa</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="col-12" id="inseridor">
                        <label>Quantidade de lugares:</label>
                        <input class="form-control" type="number" id="qtd">
                        <div id="erro"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="bt-inserir" onclick="insertMesa()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <section class="container-fluid">
        <div class="row justify-content-between sidebar-md-vh">
            <div class="col-md-2 bg-dark">
                <h3 class="ms-1 mt-3 mb-0 text-primary">Casamento</h3>
                <div class="col-4 ms-1">
                    <p class="m-0 text-secondary">Bem vindo,</p>
                    <p class="text-white fs-5" id="nomeUsuario"></p>
                </div>
                <hr class="text-white">
                <ul class="nav text-center text-sm-start text-md-start">
                    <li class="nav-item rounded col-6 col-md-12 mb-2">
                        <a class="nav-link link-light" href="dashboard.html"><i class="bi bi-bar-chart-line-fill me-1 me-md-2"></i>Dashboard</a>
                    </li>
                    <li class="nav-item rounded col-6 col-md-12 mb-2">
                        <a class="nav-link link-light" href="usuarios.html"><i class="bi bi-person-circle me-1"></i>Usuários</a>
                    </li>
                    <li class="nav-item rounded col-6 col-md-12 mb-2">
                        <a class="nav-link link-light" href="convidados.html"><i class="bi bi-person-lines-fill me-1"></i>Convidados</a>
                    </li>
                    <li class="nav-item rounded col-6 col-md-12">
                        <a class="nav-link link-light" href="index.html" target="_blank"><i class="bi bi-card-checklist me-1"></i>Presença<i class="bi bi-arrow-up-right-square ms-2"></i></a>
                    </li>
                    <li class="nav-item bg-primary rounded col-6 col-md-12 mb-2">
                        <a class="nav-link link-light" href="mesas.html"><i class="bi bi-bar-chart-line-fill me-1 me-md-2"></i>Mesas</a>
                    </li>
                </ul>

                <hr class="text-white text-bottom">
                <button class="btn btn-danger mb-4" onclick="sair()"><i class="bi bi-box-arrow-left me-2"></i>Sair</button>
            </div>
            <div class="col-12 col-md-10 sidebar-md-vh">
                <div class="container">
                    <h2 class="mt-5 fw-bold">Dashboard:</h2>
                    
                    <button class="btn btn-success mt-3 mb-3 px-2 px-3" data-bs-toggle="modal" data-bs-target="#insereModal">Inserir Mesa</button>

                    <div class="row">
                        <div class="col-12 col-md-6">
                            <div class="card py-4 text-bg-success">
                                <div class="card-body">
                                    <h2>Presentes:</h2>
                                    <div class="fs-1" id="presentes"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="card py-4 text-bg-danger">
                                <div class="card-body">
                                    <h2>Ausentes:</h2>
                                    <div class="fs-1" id="ausentes"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-success alert-dismissible mt-3 d-none" role="alert" id="alertaVerde">
                        <div>Usuário inserido com sucesso!</div>
                        <div type="button" class="btn-close" data-bs-dismiss="alert"></div>
                    </div>
                    <div class="alert alert-danger alert-dismissible mt-3 d-none" role="alert" id="alertaVermelho">
                        <div>Usuário inserido com sucesso!</div>
                        <div type="button" class="btn-close" data-bs-dismiss="alert"></div>
                    </div>
                    <div class="alert alert-primary alert-dismissible mt-3 d-none" role="alert" id="alertaAzul">
                        <div>Usuário inserido com sucesso!</div>
                        <div type="button" class="btn-close" data-bs-dismiss="alert"></div>
                    </div>
    
                    <div class="col-12 table-responsive mt-3">
                        <table class="table table-bordered my-2 shadow">
                            <thead>
                                <tr class="fw-bold">
                                    <td>Mesa</td>
                                    <td>Cadeiras</td>
                                </tr>
                            </thead>
                            <tbody id="fds">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>

       const token = localStorage.getItem("token");
        const tipo = localStorage.getItem("tipo");
        if(!token || tipo != "0"){
            alert("Você não tem permissão")
            localStorage.clear()
            window.location.href = "login.html";
        }

        async function sair(){
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function apareceNome(){
            const id = localStorage.getItem("id");
            const pegaUser = await fetch(`http://localhost:3000/usuarios?id=${id}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });

            const listaUser = await pegaUser.json();
            const [user] = listaUser;
            document.querySelector("#nomeUsuario").innerHTML = user.nome
        }
        apareceNome()

        
        
        async function pegaMesas(){
            const mesas = await fetch(`http://localhost:3000/mesas/espaco?id=`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });
            const lista = await mesas.json();
            let tabela = "";
            lista.forEach(mesa => {
                tabela += 
                `<tr>
                    <td>
                        ${mesa.id}
                    </td>
                    <td>
                        ${mesa.espacoTotal}
                    </td>
                    <td>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#atualizaModal" type="button" onclick="preparaInput(${mesa.id})"><i class="bi bi-pencil-square me-1"></i>Atualizar</button> 
                        <button class="btn btn-danger" type="button" onclick="deletaMesa(${mesa.id})"><i class="bi bi-trash" me-1"></i>Deletar</button> 
                    </td>
                `
            });
            tabela += "</tr>"
            document.querySelector("#fds").innerHTML = tabela;
            };
        pegaMesas();
        function repeatedTask() {
            pegaMesas();
            setTimeout(repeatedTask, 120000);
        }

        repeatedTask();



        async function insertMesa(){
            const qtd = document.querySelector("#qtd").value;

            const inserir = await fetch(`http://localhost:3000/mesas/`, {
                method : "POST",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                },
                body : JSON.stringify({
                    qtd : qtd
                })                
            });
            if(!inserir.ok){
                let erroAviso = "<p>Não foi</p>";
                document.querySelector("#erro").innerHTML = erroAviso;
            }else{
                const modal = bootstrap.Modal.getInstance(document.querySelector("#insereModal"));
                if(modal){
                    modal.hide();
                }
                pegaMesas();
                document.querySelector("#inseridor").reset()
                document.querySelector("#alertaVerde").classList.remove("d-none")
                document.querySelector("#alertaVerde").classList.add("d-block")
            }
        }

        async function preparaInput(id){
            const pegador = await fetch(`http://localhost:3000/mesas?id=${id}`, {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            })

            const mesas = await pegador.json();
            const mesa = mesas[0];
            document.querySelector("#AttId").value = mesa.id;
            document.querySelector("#AttQtd").value = mesa.qtd;

        }

        async function atualizaMesa(){
            const id = document.querySelector("#AttId").value;
            const qtd = document.querySelector("#AttQtd").value;

            const atualizador = await fetch(`http://localhost:3000/mesas/${id}`,{ 
                method : "PUT",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                },
                body : JSON.stringify({
                    qtd : qtd
                })
            })
            const modal = bootstrap.Modal.getInstance(document.querySelector("#atualizaModal"));
            if(modal){
                modal.hide();
            }
            pegaMesas();
            document.querySelector("#atualizador").reset();
            document.querySelector("#alertaAzul").classList.remove("d-none");
            document.querySelector("#alertaAzul").classList.add("d-block");
        }
    
        async function deletaMesa(id){
            if(confirm("Ah vá?")){
                const deletar = await fetch(`http://localhost:3000/mesas/${id}`, {
                    method : "DELETE",
                    headers : {
                        "Content-Type" : "application/json",
                        "x-access-token" : token
                    }
                })
                pegaMesas();
                document.querySelector("#alertaVermelho").classList.remove("d-none");
                document.querySelector("#alertaVermelho").classList.add("d-block");
            }
        }
    </script>
</body>
</html>
