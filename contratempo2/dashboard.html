<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css.css">
    <title>Dashboard</title>
</head>
<body id="corpo">
    
    <div class="modal fade" id="attModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Atualize o usuário</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Atualizou em
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Save changes</button>
            </div>
            </div>
        </div>
    </div>

    <section class="container-fluid">
        <div class="row d-flex flex-wrap">
            <div class="col-2 bg-dark text-white coluna">
                <div class="col-12">
                    <h3 class="text-primary mt-3 mb-0">Casamento</h3>
                    <p class="ms-2">Seja bem vindo:</p>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item rounded my-1 bg-primary">
                        <a class="nav-link active text-white" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item rounded my-1">
                        <a class="nav-link text-white" href="usuarios.html">Usuarios</a>
                    </li>
                    <li class="nav-item rounded my-1">
                        <a class="nav-link text-white" href="convidados.html">Convidados</a>
                    </li>
                    <li class="nav-item rounded my-1">
                        <a class="nav-link text-white" href="mesas.html">Mesas</a>
                    </li>
                    <li class="nav-item rounded my-1">
                        <a class="nav-link text-white" href="index.html">Lista de convidados</a>
                    </li>
                </ul>
                <div>
                    <button type="button" class="btn btn-danger" onclick="sair()">Sair</button>
                </div>
            </div>
            <div class="col-10 mt-5">
                <div class="row d-flex flex-wrap justify-content-around mt-5 mb-5">
                    <div class="col-3 py-5 align-content-center bg-success text-center rounded-5" id="presentes">
                        <h1>Presentes:</h1>
                        <h1>10</h1>
                    </div>
                    <div class="col-3 py-5 align-content-center bg-danger text-center rounded-5" id="ausentes">
                        <h1>Ausentes:</h1>
                        <h1>10</h1>
                    </div>
                </div>
                <div class="col-12">
                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Mesa</th>
                                <th id="botoes"></th>
                            </tr>
                        </thead>
                        <tbody id="convidados">                  
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script>
        const token = localStorage.getItem("token");
        async function verificaToken(){
            if(!token){
                alert("Você não tem permissão")
                window.location = "login.html"
            }
        }
        verificaToken()

        async function sair(){
            localStorage.clear();
            window.location = "login.html";
        }

        async function pegaConvidado(){
            const convidados = await fetch("http://localhost:3000/convidados", {
                method : "GET",
                headers : {
                    "Content-Type" : "application/json",
                    "x-access-token" : token
                }
            });
            const listaConvidados = await convidados.json()
            let lista = "";
            listaConvidados.forEach(convidado => {
                lista += `
                <tr>
                    <td>
                        ${convidado.nome}
                    </td>
                    <td>
                        ${convidado.email}
                    </td>
                    <td>
                        ${convidado.mesa}
                    </td>
                    <td>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#attModal">Atualizar</button>
                    </td>
                `
            })
            lista += "</tr>"
            document.querySelector("#convidados").innerHTML = lista;
        }
        pegaConvidado()
    </script>
    
</body>
</html>
