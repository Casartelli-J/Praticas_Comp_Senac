<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css.css">    
    <title>Login</title>
</head>
<body>
    <section class="container">
        <div class="row">
            <div class="col-12 d-flex flex-wrap justify-content-center">
                <h1 class="col-12 my-5 text-center text-white logText rounded">Faça seu Login:</h1>
                <div class="alert alert-danger" hidden id="alerta">
                    Email ou Senha incorretos!
                </div>
                <div class="col-12 d-flex justify-content-center mt-3 translucido rounded-5">
                    <form class="col-12 p-5 needs-validation" id="formLogin">
                        <div class="col-12 mb-4">
                            <label class="form-label text-white">Email:</label>
                            <input type="email" id="email" class="form-control p-2" placeholder="Insira seu email">
                        </div>
                        <div class="valid-feedback">
                            Ok
                        </div>
                        <div class="invalid-feedback">
                            No
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label text-white">Senha:</label>
                            <input type="password" id="senha" class="form-control p-2" placeholder="Insira sua senha">
                        </div>
                        <button type="submit" class="btn btn-success">Logar</button>
                    </form>
                </div>
            </div>
        </div>
    </section>


    <script>

        async function login(){
            const email = document.querySelector("#email").value;
            const senha = document.querySelector("#senha").value;

            const logar = await fetch("http://localhost:3000/login",{
                method : "POST",
                headers : {
                    "Content-Type" : "application/json"
                },
                body : JSON.stringify({
                    email : email,
                    senha : senha
                })
            })
            const logado = await logar.json()
            console.log(logado)
            const token = logado.token
            if(logar.ok){
                localStorage.setItem("token", token);
                window.location = "index.html";
            }else{
                document.querySelector("#alerta").hidden = false
                document
            }
        }

        document.querySelector("#formLogin").addEventListener("submit", event =>{
            event.preventDefault();
            login();
        })
    

        const forms = document.querySelectorAll('.needs-validation')


  
        forms.forEach(form => {
            form.addEventListener('focusout', event => {
            if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            }

            form.classList.add('was-validated')
            }, false)
        })

    </script>
</body>
</html>
