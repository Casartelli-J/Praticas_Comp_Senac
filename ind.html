        const formEnviar = document.querySelector("#placehold");
        formEnviar.addEventListener('submit', (e) =>{
            e.preventDefault();
            insertUser();
            formEnviar.reset();
        })

        async function insertUser() {
            const nome = document.querySelector('#placehold').value;
            const email = document.querySelector('#placehold').value;
            const telefone = document.querySelector('#placehold').value;

            const enviar = await fetch(`servidorLocal`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    telefone: telefone
                })
            });

            const dados = await enviar.json();

        }
