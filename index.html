<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de convidados</title>
</head>
<body>
    <form method="get" id="form-busca">
        <input type="search" id="busca" placeholder="Busca por nome">
        <button>Buscar</button>
    </form>

    <form method="post" id="insert-user" style="margin: 40px 0;">
        <input type="text" id="nome" placeholder="Escreva seu nome" required>
        <input type="email" id="email" placeholder="Escreva seu email" required>
        <input type="password" id="senha" placeholder="Escreva sua senha" required>
        <button>Cadastrar</button>
    </form>

    <div id="conteudo"></div>

    <form method="post" id="edit-user" style="margin: 40px 0; display: none;">
        <input type="text" id="edit-nome" placeholder="Escreva seu nome" required>
        <input type="email" id="edit-email" placeholder="Escreva seu email" required>
        <input type="password" id="edit-senha" placeholder="Escreva sua senha" required>
        <button>Atualizar</button>
    </form>

    <script>

        /*Inserção de dados*/
        
        const formEnviar = document.querySelector("#insert-user");
        formEnviar.addEventListener('submit', (e) => {
            e.preventDefault();
            insertUser();
            formEnviar.reset();
        })
        async function insertUser() {
            const nome = document.querySelector('#nome').value;
            const email = document.querySelector('#email').value;
            const senha = document.querySelector('#senha').value;
            
            const enviar = await fetch(`http://localhost:3000/usuarios/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    senha: senha
                })
            });
            const dados = await enviar.json();
            selectUsers();
        }



        /*Busca e filtragem de dados*/
        const formBusca = document.querySelector('#form-busca');        
        formBusca.addEventListener('submit', async (e) =>{
            e.preventDefault();
            selectUsers();
        })        
        async function selectUsers(){
            const busca  = document.querySelector('#busca').value;
            let url = 'http://localhost:3000/usuarios';
            if(busca != ""){
                url = `http://localhost:3000/usuarios?nome=${busca}`;
            }

            //const declara e define que ela é imutável, não modificavel, vai ficar assim.
            const resposta = await fetch(url);
            const usuarios = await resposta.json();
            const conteudo = document.querySelector('#conteudo');
            //let é pra declarar a variável.
            let dado = "";
            usuarios.forEach(usuario => {
                dado += `<p><button onclick="updateUser(${usuario.ID_usuario})">Editar</button> <button onclick="deleteUser(${usuario.ID_usuario})">Excluir</button> - Dados do usuário ${usuario.nome} - ${usuario.email} - ${usuario.senha}</p>`
            });
            conteudo.innerHTML = dado;
        }
        selectUsers()


        /*Deletagem dos dados baby*/
        
        async function deleteUser(id){
            if(confirm("Tem certeza meo?")){
            const deletar = await fetch(`http://localhost:3000/usuarios/${id}`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'}
            })
                const dados = await deletar.json();
                selectUsers();
            }
        }
        
        async function selectUser(id) {
            let url = `http://localhost:3000/usuarios?id=${id}`;
            const resposta = await fetch(url);
            const usuario = await resposta.json();
            return usuario;
        }


        /*Atualizando users*/

        async function updateUser(id) {
            const nome = document.querySelector('#edit-nome');
            const email = document.querySelector('#edit-email');
            const senha = document.querySelector('#edit-senha');
            const editForm = document.querySelector('#edit-user');
            if(id != ""){
                editForm.style.display = "block";
            }

            let usuario = await selectUser(id);
            nome.value = usuario[0].nome;
            email.value = usuario[0].email;
            senha.value = usuario[0].senha;    
        
            if(confirm("Tem certeza meo?")){
            const atualizar = await fetch(`http://localhost:3000/usuarios/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nome: nome.value,
                    email: email.value,
                    senha: senha.value
                })
            })
                const dados = await atualizar.json();
                selectUsers();
            }
        }

    </script>
</body>
</html>
