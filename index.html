<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Praticas_Comp_Senac/template/css/bootstrap.min.css">
    <script src="../Praticas_Comp_Senac/template/js/bootstrap.min.js"></script>
    <title>Busca de convidados</title>
    <style type="text/css">
        body{
            background-color: gray;
        }
        .tela{
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="modal fade" id="updateUser" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Atualizar perfil</h5>
                </div>
                <div class="modal-body">
                    <form class="row justify-content-center align-content-center" method="post" id="edit-user" style="margin: 40px 0;">
                        
                        <input type="hidden" id="edit-id" required readonly>

                        <div class="col-auto">
                            <label for="nome">Nome:</label>
                            <input class="form-control" type="text" id="edit-nome" placeholder="Escreva seu nome" required>
                        </div>

                        <div class="col-auto">
                            <label for="mail">Email:</label>
                            <input class="form-control" type="email" id="edit-email" placeholder="Escreva seu email" required>
                        </div>
                        <div class="col-auto">
                            <label for="password">Senha:</label>
                            <input class="form-control" type="password" id="edit-senha" placeholder="Escreva sua senha" required>
                            <div class="text-end mt-4">
                                <button class="btn btn-success" data-bs-dismiss="modal" >Atualizar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="insertUser" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Crie uma conta!</h5>
                </div>
                <div class="modal-body">
                    <form class="row justify-content-center align-content-center" method="post" id="insert-user" style="margin:30px 0;">
                        
                        <div class="col-12 my-2">
                            <label for="nome">Nome:</label>
                            <input class="form-control" type="text" id="nome" placeholder="Escreva seu nome" required>
                        </div>

                        <div class="col-12 my-2">
                            <label for="nome">Email:</label>
                            <input class="form-control" type="email" id="email" placeholder="Escreva seu email" required>
                        </div>

                        <div class="col-12 mt-2">
                            <label for="nome">Senha:</label>
                            <input class="form-control" type="password" id="senha" placeholder="Escreva sua senha" required>
                            <div class="text-end mt-4">
                                <button class="btn btn-success">Cadastrar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <header class="container d-flex flex-wrap justify-content-between py-3 bg-black rounded">
        <div class="col-1 text-center align-content-center">
            <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#insertUser">Inserir</button>
        </div>
        <div class="col-11">
            <form class="row p-3" method="get" id="form-busca">
                <div class="col-11">
                    <input class="form-control" type="search" id="busca" placeholder="Busca por nome">
                </div>
                <div class="col-1">
                    <button class="btn btn-success">Buscar</button>
                </div>
            </form>
        </div>
    </header>

    <section class="container">
        <div class="col-12 bg-white mt-4">
            <div id="conteudo">
                <table class="table table-striped">
                    <thead class="table-dark table-group-divider">
                        <tr>
                            <th scope="col">Nome</th>
                            <th scope="col">Email</th>
                            <th scope="col">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="ficha">
                    </tbody>

                </table>
            </div>
        </div>
    </section>

   

    <script>

      
        /*Inserção de dados*/
        
        const formEnviar = document.querySelector("#insert-user");
        formEnviar.addEventListener('submit', (e) => {
            e.preventDefault();
            insertUser();
            formEnviar.reset();
        })
        async function insertUser() {
            const nome = document.querySelector('#nome').value;
            const email = document.querySelector('#email').value;
            const senha = document.querySelector('#senha').value;
            
            const enviar = await fetch(`http://localhost:3000/usuarios/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    senha: senha
                })
            });
            const dados = await enviar.json();
            selectUsers();
        }



        /*Busca e filtragem de dados*/
        const formBusca = document.querySelector('#form-busca');        
        formBusca.addEventListener('submit', async (e) =>{
            e.preventDefault();
            selectUsers();
        })        
        async function selectUsers(){
            const busca  = document.querySelector('#busca').value;
            let url = 'http://localhost:3000/usuarios';
            if(busca != ""){
                url = `http://localhost:3000/usuarios?nome=${busca}`;
            }

            //const declara e define que ela é imutável, não modificavel, vai ficar assim.
            const resposta = await fetch(url);
            const usuarios = await resposta.json();
            const conteudo = document.querySelector('#ficha');
            //let é pra declarar a variável.
            let dado = "";
            usuarios.forEach(usuario => {
                dado += `
                <tr>
                    <td>
                        ${usuario.nome}
                    </td>
                    <td>
                        ${usuario.email}
                    </td>
                    <td>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#updateUser" onclick="selectUser(${usuario.ID_usuario})">Editar</button> 
                        <button class="btn btn-danger" onclick="deleteUser(${usuario.ID_usuario})">Excluir</button> 
                    </td>
                </tr>`
            });
            conteudo.innerHTML = dado;
        }
        selectUsers()


        /*Deletagem dos dados baby*/
        
        async function deleteUser(id){
            if(confirm("Tem certeza meo?")){
            const deletar = await fetch(`http://localhost:3000/usuarios/${id}`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'}
            })
                const dados = await deletar.json();
                selectUsers();
            }
        }


        
        async function selectUser(id) {
            const editId = document.querySelector('#edit-id');
            const nome = document.querySelector('#edit-nome');
            const email = document.querySelector('#edit-email');
            const senha = document.querySelector('#edit-senha');
            const editForm = document.querySelector('#edit-user');
            
            let url = `http://localhost:3000/usuarios?id=${id}`;
            const resposta = await fetch(url);
            const usuario = await resposta.json();
            
            if( usuario[0].nome != "" ){
                editForm.style.display = "block";
                editId.value = usuario[0].ID_usuario;
                nome.value = usuario[0].nome;
                email.value = usuario[0].email;
                senha.value = usuario[0].senha;
            }
        }

        
        /*Atualizando users*/
        
        async function updateUser() {
            const id = document.querySelector('#edit-id').value;
            const nome = document.querySelector('#edit-nome').value;
            const email = document.querySelector('#edit-email').value;
            const senha = document.querySelector('#edit-senha').value;
            const editForm = document.querySelector('#edit-user').value;

            const atualizar = await fetch(`http://localhost:3000/usuarios/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nome: nome,
                    email: email,
                    senha: senha
                })
            });
            const resultado = await atualizar.json();
            selectUsers();

        }
        
        const editForm = document.querySelector("#edit-user");
        editForm.addEventListener('submit', (e) => {
            e.preventDefault();
            updateUser();
            editForm.reset()
            // editForm.style.display = 'none'
        })


    </script>
</body>
</html>
