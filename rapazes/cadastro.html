<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Cadastre-se rapaz!</title>
	<link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
	<section>
        <div class="zap">
            <a href="https://w.app/checkpoint_dos_rapazes" target="_blank"><img src="img/main/zap.png"></a>
        </div>
    </section>
<div class="posicao">
    <img src="img/cadastro/logo.png" class="logo" alt="Checkpoint dos Rapazes">

    <div class="cadastro">
      	<h1>Crie sua conta</h1>
      	<form>
      		<input type="text" name="nome" placeholder="Seu nome">
        	<input type="email" name="email" placeholder="Seu email">
        	<input type="password" name="senha" placeholder="Crie uma senha">
        	<input type="password" name="confirmar" placeholder="Confirme a senha">
        	<a href="main.html" class="botao-cadastro">
        		<div class="color-botao">
        			<p>Cadastrar!</p>
        		</div>
        	</a>

    	</form>

    	<p class="cadastro-links">
        	Já tem conta? <a href="login.html">Entrar</a>
        </p>
</body>
</html>
