<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="css/rec_senha.css">
	<title>Recuperação de senha</title>
</head>
<body>
	<section>
        <div class="zap">
            <a href="https://w.app/checkpoint_dos_rapazes" target="_blank"><img src="img/main/zap.png"></a>
        </div>
    </section>
	<div class="posicao">
		<header>
			<img src="img/log_page/logo.png" class="logo" alt="Checkpoint dos Rapazes">
		</header>
		<section>
			<div class="rec-senha">

				<h1>Acesse sua conta</h1>

				<form class="espaco">
					<input type="email" name="email" placeholder="Seu email">

					<input type="password" name="email" placeholder="Senha nova">

					<input type="password" name="Senha" placeholder="Repita a senha">

					<a href="main.html" class="botao-senha">
        				<div class="color-botao">
        					<p>Confirmar nova senha</p>
        				</div>
        			</a>
					

				</form>

			</div>
		</section>
	</div>
</body>
</html>
